<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full수록 3-1 — 에듀케레 분석지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2744;
  --navy2: #223059;
  --gold: #c8a84b;
  --gold-light: #fdf6e3;
  --green: #1a6e3c;
  --green-light: #e8f5ee;
  --red: #b5291c;
  --red-light: #fdecea;
  --gray1: #f5f7fb;
  --gray2: #e8ecf4;
  --gray3: #c5cde0;
  --gray4: #7a88a8;
  --text: #1a2744;
  --text2: #4a5674;
  --white: #ffffff;
  --shadow: 0 2px 12px rgba(26,39,68,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray1); color: var(--text); min-height: 100vh; }

/* HEADER */
.app-header {
  background: var(--navy);
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,0.22);
}
.app-logo { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--white); }
.app-logo span { color: var(--gold); }
.app-sub { font-size: 0.72rem; color: var(--gray4); letter-spacing: 0.08em; }

/* PASSAGE NAV (top) */
.passage-nav {
  background: var(--navy2);
  padding: 0 16px;
  display: flex; gap: 2px;
  overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.passage-nav::-webkit-scrollbar { display: none; }
.pnav-btn {
  flex-shrink: 0;
  padding: 13px 18px;
  font-size: 0.78rem; font-weight: 500;
  color: var(--gray4);
  background: none; border: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.pnav-btn:hover { color: var(--white); }
.pnav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* MAIN */
.main { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }

/* PASSAGE VIEW */
.passage-view { display: none; }
.passage-view.active { display: block; }

/* PASSAGE HEADER */
.p-header {
  background: var(--navy);
  border-radius: 14px;
  padding: 28px 32px;
  margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.p-header::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--navy2), var(--gold), var(--navy2));
}
.p-num { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); font-weight: 600; }
.p-title { font-family: 'Playfair Display', serif; font-size: 1.45rem; color: var(--white); margin-top: 6px; }

/* SECTION TABS */
.sec-tabs {
  display: flex; gap: 4px;
  background: var(--white);
  border-radius: 10px; padding: 4px;
  margin-bottom: 22px;
  overflow-x: auto; scrollbar-width: none;
  box-shadow: var(--shadow);
}
.sec-tabs::-webkit-scrollbar { display: none; }
.sec-tab {
  flex-shrink: 0;
  padding: 8px 16px; border-radius: 7px;
  font-size: 0.78rem; font-weight: 500;
  color: var(--gray4); background: none; border: none; cursor: pointer;
  white-space: nowrap; transition: color .2s, background .2s;
}
.sec-tab:hover { color: var(--text); }
.sec-tab.active { background: var(--navy); color: var(--white); }

.sec-panel { display: none; }
.sec-panel.active { display: block; }

/* CARD */
.card {
  background: var(--white); border-radius: 12px;
  padding: 26px 28px; margin-bottom: 18px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-title::after { content: ''; flex: 1; height: 1px; background: var(--gray2); }

/* PASSAGE TEXT BOX */
.passage-box {
  font-family: 'EB Garamond', serif;
  font-size: 17px; line-height: 1.85;
  color: var(--text);
  border: 2px solid var(--navy);
  border-radius: 10px;
  padding: 22px 26px;
  margin-bottom: 18px;
  background: #fafbff;
}

/* SENTENCE ANALYSIS */
.sent-block { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--gray2); }
.sent-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.sent-num { display: inline-block; width: 22px; height: 22px; border-radius: 50%; background: var(--navy); color: var(--white); font-size: 0.7rem; font-weight: 700; text-align: center; line-height: 22px; margin-right: 6px; flex-shrink: 0; }
.sent-en {
  font-family: 'EB Garamond', serif; font-size: 15px; line-height: 1.8;
  color: var(--text); border: 1px solid var(--navy); border-radius: 7px;
  padding: 10px 14px; background: #fafbff; margin-bottom: 8px;
}
.sent-kr { font-size: 0.83rem; color: var(--text2); line-height: 1.7; margin-bottom: 10px; padding-left: 4px; }
.gram-list { list-style: none; padding-left: 4px; }
.gram-list li {
  font-size: 0.78rem; color: var(--text2); line-height: 1.65;
  padding: 4px 0 4px 14px; position: relative;
}
.gram-list li::before { content: '▸'; position: absolute; left: 0; color: var(--gold); }
.gram-tag {
  display: inline-block; font-size: 0.68rem; font-weight: 700;
  background: var(--navy); color: var(--white);
  border-radius: 4px; padding: 1px 7px; margin-right: 5px;
}

/* 문법총정리 */
.gram-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--gray2); }
.gram-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.gram-item-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--gold); color: var(--white); font-size: 0.72rem; font-weight: 700; margin-right: 8px; flex-shrink: 0; }
.gram-item-title { font-size: 0.88rem; font-weight: 700; color: var(--navy); }
.gram-item-body { font-size: 0.82rem; color: var(--text2); line-height: 1.7; margin-top: 6px; padding-left: 30px; }
.gram-evidence { font-family: 'EB Garamond', serif; font-size: 14px; color: var(--navy2); background: var(--gray1); border-left: 3px solid var(--gold); padding: 6px 10px; border-radius: 0 6px 6px 0; margin: 6px 0 6px 30px; }
.gram-point { font-size: 0.76rem; color: var(--green); background: var(--green-light); border-radius: 5px; padding: 4px 10px; margin-left: 30px; display: inline-block; }

/* 전문해석 */
.trans-text { font-size: 0.92rem; line-height: 2.0; color: var(--text); word-break: keep-all; }

/* 주제구조 */
.struct-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
.struct-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; color: var(--white); background: var(--navy); border-radius: 5px; padding: 3px 10px; flex-shrink: 0; margin-top: 2px; }
.struct-val { font-size: 0.88rem; color: var(--text); line-height: 1.7; }

/* 변형문제 */
.q-block { margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid var(--gray2); }
.q-block:last-child { border-bottom: none; }
.q-type-badge {
  display: inline-block; font-size: 0.68rem; font-weight: 700;
  border-radius: 4px; padding: 2px 9px; margin-bottom: 10px;
}
.badge-주제 { background: #e3ecff; color: #1a4fa0; }
.badge-빈칸 { background: #fff3e0; color: #b35a00; }
.badge-어법 { background: #f3e8ff; color: #6a1b9a; }
.badge-불일치 { background: #fce4ec; color: #880e4f; }
.badge-순서 { background: #e8f5e9; color: #1b5e20; }
.badge-서술형 { background: var(--navy); color: var(--white); }
.q-stem { font-size: 0.88rem; font-weight: 500; color: var(--text); line-height: 1.7; margin-bottom: 12px; }
.q-passage-box { font-family: 'EB Garamond', serif; font-size: 14.5px; line-height: 1.8; color: var(--text); background: var(--gray1); border: 1px solid var(--gray3); border-radius: 8px; padding: 14px 18px; margin-bottom: 12px; }
.q-options { list-style: none; }
.q-option {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 9px 14px; border-radius: 8px; margin-bottom: 6px;
  cursor: pointer; border: 1.5px solid var(--gray2);
  font-size: 0.84rem; color: var(--text2); line-height: 1.6;
  transition: border-color .15s, background .15s;
  user-select: none;
}
.q-option:hover { border-color: var(--navy); background: #f0f3fb; }
.q-option.correct { border-color: var(--green) !important; background: var(--green-light) !important; color: var(--green) !important; font-weight: 600; }
.q-option.wrong { border-color: var(--red) !important; background: var(--red-light) !important; color: var(--red) !important; }
.opt-num { font-weight: 700; flex-shrink: 0; }
.q-commentary {
  display: none; font-size: 0.78rem; color: var(--text2);
  background: var(--gray1); border-radius: 6px; padding: 8px 12px;
  margin-top: 6px; line-height: 1.65;
}
.q-commentary.show { display: block; }
.q-reset { font-size: 0.72rem; color: var(--gray4); background: none; border: 1px solid var(--gray3); border-radius: 5px; padding: 3px 10px; cursor: pointer; margin-top: 8px; }
.q-reset:hover { color: var(--navy); border-color: var(--navy); }

/* 서술형 */
.cond-box { font-size: 0.76rem; color: var(--text2); background: var(--gold-light); border-left: 3px solid var(--gold); border-radius: 0 6px 6px 0; padding: 6px 12px; margin-bottom: 10px; }
.cond-box span { font-weight: 700; color: var(--gold); margin-right: 4px; }
.answer-lines { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.answer-line { height: 36px; border-bottom: 1.5px solid var(--gray3); }

/* 정답지 */
.ans-block { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--gray2); }
.ans-block:last-child { border-bottom: none; }
.ans-q-label { font-size: 0.75rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.ans-correct { display: inline-block; font-size: 0.9rem; font-weight: 700; color: var(--green); background: var(--green-light); border-radius: 6px; padding: 3px 12px; margin-bottom: 6px; }
.ans-commentary { font-size: 0.8rem; color: var(--text2); line-height: 1.65; }
.ans-model { background: #f0fdf4; border-left: 3px solid var(--green); padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 0.82rem; color: var(--green); font-weight: 500; margin-top: 6px; }

/* SCORE */
.score-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.score-txt { font-size: 0.8rem; color: var(--gray4); }
.score-num { font-weight: 700; color: var(--navy); }
</style>
</head>
<body>
<header class="app-header">
  <div class="app-logo">에듀케레 <span>분석지</span></div>
  <div class="app-sub">FULL수록 3-1</div>
</header>
<nav class="passage-nav" id="passageNav"></nav>
<div class="main" id="mainContent"></div>

<script>
const PASSAGES = [
  // ── PASSAGE 1 ──────────────────────────────────────────────
  {
    id: "3-1",
    title: "문학 속 현대 작사가의 기여",
    sentences: [
      {
        num: "①",
        en: "The study of literature has repeatedly failed to recognize the influence of modern musical lyricists and their contributions to the evolution of language.",
        slash: "문학 연구는 / 반복적으로 인식하지 못해 왔다 / 현대 음악 작사가들의 영향과 / 그들의 기여를 / 언어의 진화에 대한",
        grammar: [
          { tag: "현재완료", body: "'has failed'는 과거부터 현재까지 지속되는 실패를 나타냄. 'The team has never won.' → 시험 포인트: have/has + p.p. 형태 구별" },
          { tag: "부정사 목적어", body: "'failed to recognize'에서 to부정사가 fail의 목적어. 'fail/refuse/want + to-V' 패턴 → 동명사와 혼동 주의" }
        ]
      },
      {
        num: "②",
        en: "Unlike Shakespeare, who has been studied and celebrated for his development of the English language, particularly in vocabulary and grammatical structure, modern songwriters have experienced restraints on the acknowledgement of their contributions and largely been ignored.",
        slash: "셰익스피어와 달리, / 그는 연구되고 칭송받아 왔는데 / 영어 발전에 대한 공로로, / 특히 어휘와 문법 구조에서, / 현대 작곡가들은 제약을 경험해 왔고 / 자신들의 기여에 대한 인정에 있어 / 크게 무시당해 왔다",
        grammar: [
          { tag: "관계대명사 계속적 용법", body: "'Shakespeare, who has been ...'에서 who는 앞 명사에 부연 설명. 콤마+who → 계속적 용법 → 시험 포인트: that으로 대체 불가" },
          { tag: "수동태 현재완료", body: "'have been ignored'는 현재완료 수동태. 'have/has + been + p.p.' → 능동·수동 전환 문제 출제" }
        ]
      },
      {
        num: "③",
        en: "Over the past century, we have witnessed an explosion of incredible literary works by these artists, who, through their music, have used linguistic manipulation and storytelling to enrich our language and literature.",
        slash: "지난 한 세기 동안, / 우리는 목격해 왔다 / 놀라운 문학 작품들의 폭발적 증가를 / 이 예술가들에 의한, / 그들은 음악을 통해 / 언어적 조작과 스토리텔링을 활용해 왔다 / 우리의 언어와 문학을 풍요롭게 하기 위해",
        grammar: [
          { tag: "to부정사 목적", body: "'to enrich'는 목적의 의미(~하기 위해). 'use A to-V' 패턴 → 부사적 용법(목적) 확인" },
          { tag: "관계대명사 계속적", body: "'artists, who ... have used'에서 who 이하가 앞 명사를 부연. 시험 포인트: 주격 관계대명사 뒤 동사 수 일치" }
        ]
      },
      {
        num: "④",
        en: "Producing lyrics of distinct and complex imagery, songwriters have had an incredible literary impact on our language.",
        slash: "독특하고 복잡한 이미지의 가사를 만들어 내면서, / 작곡가들은 엄청난 문학적 영향을 미쳐 왔다 / 우리의 언어에",
        grammar: [
          { tag: "분사구문", body: "주절 주어(songwriters)와 동일 주어이므로 생략. 'Producing ...' = 'As they produce ...' → 시험 포인트: 분사구문 의미상 주어 확인" }
        ]
      },
      {
        num: "⑤",
        en: "Their remarkable works, including influences on modern language development, must be recognized in the field of modern literature.",
        slash: "그들의 놀라운 작품들은, / 현대 언어 발전에 대한 영향을 포함하여, / 반드시 인정받아야 한다 / 현대 문학 분야에서",
        grammar: [
          { tag: "조동사 수동태", body: "'must be recognized'는 조동사+수동태. 'must/should/can + be + p.p.' → 조동사 수동 구조 어법 문제 출제" }
        ]
      }
    ],
    grammar: [
      { title: "현재완료(have p.p.)", evidence: "has repeatedly failed / have witnessed / have had", point: "과거~현재 지속·경험을 나타냄. 시험: have/has 구별, 과거시제와 혼동 주의" },
      { title: "관계대명사 계속적 용법 (,who)", evidence: "Shakespeare, who has been studied ... / artists, who ... have used", point: "선행사에 부연 설명. that으로 대체 불가, 콤마 유무에 따른 의미 차이 출제" },
      { title: "수동태 현재완료 (have been p.p.)", evidence: "have been ignored / has been studied and celebrated", point: "능동·수동 전환 문제 빈출. 주어가 행위를 당하는지 확인" },
      { title: "분사구문 (V-ing)", evidence: "Producing lyrics of distinct and complex imagery, songwriters have had ...", point: "주절 주어와 동일 → 주어 생략. 의미상 주어 불일치 오류 주의" },
      { title: "조동사 수동태 (must be p.p.)", evidence: "must be recognized in the field of modern literature", point: "조동사+be+p.p. 구조. 능동형 must recognize와 혼동 주의" }
    ],
    translation: "문학 연구는 현대 음악 작사가들의 영향력과 언어 진화에 대한 그들의 기여를 반복적으로 인식하지 못해 왔다. 셰익스피어는 어휘와 문법 구조를 중심으로 한 영어 발전에 대한 공로로 연구되고 칭송받아 온 반면, 현대 작곡가들은 자신들의 기여에 대한 인정에 있어 제약을 경험해 왔고 크게 무시당해 왔다. 지난 한 세기 동안, 우리는 이 예술가들에 의한 놀라운 문학 작품들의 폭발적 증가를 목격해 왔는데, 그들은 음악을 통해 언어적 조작과 스토리텔링을 활용하여 우리의 언어와 문학을 풍요롭게 해 왔다. 독특하고 복잡한 이미지의 가사를 만들어 내면서, 작곡가들은 우리의 언어에 엄청난 문학적 영향을 미쳐 왔다. 현대 언어 발전에 대한 영향을 포함한 그들의 놀라운 작품들은 현대 문학 분야에서 반드시 인정받아야 한다.",
    topic: "현대 음악 작사가들의 문학적 기여",
    main_idea: "현대 음악 작사가들이 언어와 문학 발전에 끼친 지대한 영향이 현대 문학 분야에서 반드시 인정받아야 한다.",
    structure: "문제 제기(작사가 기여 미인정) → 대조(셰익스피어 vs. 현대 작사가) → 근거(문학적 영향) → 주장(인정 촉구)",
    questions: [
      {
        type: "주제",
        badge: "badge-주제",
        stem: "1. 다음 글의 주제로 가장 적절한 것은?",
        passage: null,
        options: [
          "the decline of traditional literary studies in modern academia",
          "the need to acknowledge modern lyricists' literary contributions",
          "how Shakespeare influenced modern songwriting techniques",
          "the relationship between music and vocabulary development",
          "why modern literature fails to attract young readers"
        ],
        answer: 1,
        commentary: "필자는 현대 작사가들의 기여가 문학 분야에서 인정받아야 한다고 주장하므로 ②가 정답."
      },
      {
        type: "빈칸",
        badge: "badge-빈칸",
        stem: "2. 다음 빈칸에 들어갈 말로 가장 적절한 것은?",
        passage: "Modern songwriters have used ________ and storytelling to enrich our language and literature, yet their contributions remain largely unrecognized.",
        options: [
          "scientific research",
          "linguistic manipulation",
          "theatrical performance",
          "academic criticism",
          "visual imagery alone"

function buildPassageHTML(p) {
  // 1. 원문 텍스트
  const fullText = p.sentences.map(s => s.en).join(' ');

  // 2. 문장분석
  const sentHTML = p.sentences.map(s => `
    <div class="sent-block">
      <div class="sent-en"><span class="sent-num">${s.num}</span> ${s.en}</div>
      <div class="sent-kr">✦ ${s.slash}</div>
      <ul class="gram-list">
        ${s.grammar.map(g => `<li><span class="gram-tag">${g.tag}</span>${g.body}</li>`).join('')}
      </ul>
    </div>
  `).join('');

  // 3. 문법총정리
  const gramHTML = p.grammar.map((g, i) => `
    <div class="gram-item">
      <span class="gram-item-num">${i+1}</span>
      <span class="gram-item-title">${g.title}</span>
      <div class="gram-evidence">${g.evidence}</div>
      <div class="gram-item-body">${g.title} — 출제 포인트: </div>
      <span class="gram-point">📝 ${g.point}</span>
    </div>
  `).join('');

  // 4. 변형문제
  const pid = p.id.replace('-','');
  const qHTML = p.questions.map((q, qi) => {
    const opts = q.options.map((opt, oi) => `
      <li class="q-option" onclick="checkAnswer('${pid}','${qi}',${oi},${q.answer})">
        <span class="opt-num">${['①','②','③','④','⑤'][oi]}</span> <span>${opt}</span>
      </li>
    `).join('');
    const passageBox = q.passage ? `<div class="q-passage-box">${q.passage.replace(/\n/g,'<br>')}</div>` : '';
    return `
      <div class="q-block" id="qblock-${pid}-${qi}">
        <span class="q-type-badge ${q.badge}">${q.type}</span>
        <div class="q-stem">${q.stem}</div>
        ${passageBox}
        <ul class="q-options">${opts}</ul>
        <div class="q-commentary" id="qcom-${pid}-${qi}">💡 ${q.commentary}</div>
        <button class="q-reset" onclick="resetQ('${pid}','${qi}')">↺ 다시풀기</button>
      </div>
    `;
  }).join('');

  // 5. 서술형
  const ssHTML = p.seosulyeong.map(s => `
    <div class="q-block">
      <span class="q-type-badge badge-서술형">서술형 ${s.num}</span>
      <div class="q-stem">${s.stem}</div>
      ${s.passage ? `<div class="q-passage-box">${s.passage}</div>` : ''}
      <div class="cond-box"><span>【조건】</span>${s.cond}</div>
      <div class="answer-lines">${Array(s.lines).fill('<span class="answer-line"></span>').join('')}</div>
    </div>
  `).join('');

  // 6. 정답지
  const ansHTML = p.questions.map((q, qi) => `
    <div class="ans-block">
      <div class="ans-q-label">${qi+1}번 (${q.type})</div>
      <span class="ans-correct">${['①','②','③','④','⑤'][q.answer]}</span>
      <div class="ans-commentary">${q.commentary}</div>
    </div>
  `).join('') + `<hr style="border:none;border-top:1px solid var(--gray2);margin:20px 0;">` +
  p.seosulyeong.map(s => `
    <div class="ans-block">
      <div class="ans-q-label">서술형 ${s.num}</div>
      <div class="ans-model">✅ ${s.answer}</div>
    </div>
  `).join('');

  return `
    <div class="passage-view" id="pv-${pid}">
      <div class="p-header">
        <div class="p-num">PASSAGE ${p.id}</div>
        <div class="p-title">${p.title}</div>
      </div>
      <div class="sec-tabs" id="tabs-${pid}">
        <button class="sec-tab active" onclick="showTab('${pid}',0,this)">① 문장분석</button>
        <button class="sec-tab" onclick="showTab('${pid}',1,this)">② 문법총정리</button>
        <button class="sec-tab" onclick="showTab('${pid}',2,this)">③ 전문해석</button>
        <button class="sec-tab" onclick="showTab('${pid}',3,this)">④ 주제·구조</button>
        <button class="sec-tab" onclick="showTab('${pid}',4,this)">⑤ 변형문제</button>
        <button class="sec-tab" onclick="showTab('${pid}',5,this)">⑥ 서술형</button>
        <button class="sec-tab" onclick="showTab('${pid}',6,this)">⑦ 정답지</button>
      </div>

      <div class="sec-panel active" id="tab-${pid}-0">
        <div class="card">
          <div class="card-title">원문</div>
          <div class="passage-box">${fullText}</div>
        </div>
        <div class="card">
          <div class="card-title">문장분석</div>
          ${sentHTML}
        </div>
      </div>

      <div class="sec-panel" id="tab-${pid}-1">
        <div class="card">
          <div class="card-title">문법총정리</div>
          ${gramHTML}
        </div>
      </div>

      <div class="sec-panel" id="tab-${pid}-2">
        <div class="card">
          <div class="card-title">전문해석</div>
          <div class="trans-text">${p.translation}</div>
        </div>
      </div>

      <div class="sec-panel" id="tab-${pid}-3">
        <div class="card">
          <div class="card-title">주제·요지·구조</div>
          <div class="struct-row"><span class="struct-label">주제</span><span class="struct-val">${p.topic}</span></div>
          <div class="struct-row"><span class="struct-label">요지</span><span class="struct-val">${p.main_idea}</span></div>
          <div class="struct-row"><span class="struct-label">구조</span><span class="struct-val">${p.structure}</span></div>
        </div>
      </div>

      <div class="sec-panel" id="tab-${pid}-4">
        <div class="card">
          <div class="card-title">변형문제</div>
          ${qHTML}
        </div>
      </div>

      <div class="sec-panel" id="tab-${pid}-5">
        <div class="card">
          <div class="card-title">서술형</div>
          ${ssHTML}
        </div>
      </div>

      <div class="sec-panel" id="tab-${pid}-6">
        <div class="card">
          <div class="card-title">정답지</div>
          ${ansHTML}
        </div>
      </div>
    </div>
  `;
}

// ═══ NAVIGATION ══════════════════════════════════════════════

function showPassage(pid) {
  document.querySelectorAll('.passage-view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.pnav-btn').forEach(el => el.classList.remove('active'));
  const pv = document.getElementById('pv-' + pid);
  if (pv) pv.classList.add('active');
  const btn = document.getElementById('pnav-' + pid);
  if (btn) {
    btn.classList.add('active');
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function showTab(pid, idx, btn) {
  for (let i = 0; i < 7; i++) {
    const el = document.getElementById('tab-' + pid + '-' + i);
    if (el) el.classList.remove('active');
  }
  const target = document.getElementById('tab-' + pid + '-' + idx);
  if (target) target.classList.add('active');
  document.querySelectorAll('#tabs-' + pid + ' .sec-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ═══ QUIZ ════════════════════════════════════════════════════

const answered = {};

function checkAnswer(pid, qi, selected, correct) {
  const key = pid + '-' + qi;
  if (answered[key]) return;
  answered[key] = true;

  const block = document.getElementById('qblock-' + pid + '-' + qi);
  const opts = block.querySelectorAll('.q-option');
  opts.forEach((opt, i) => {
    opt.style.pointerEvents = 'none';
    if (i === correct) opt.classList.add('correct');
    else if (i === selected) opt.classList.add('wrong');
  });
  const com = document.getElementById('qcom-' + pid + '-' + qi);
  if (com) com.classList.add('show');
}

function resetQ(pid, qi) {
  const key = pid + '-' + qi;
  delete answered[key];
  const block = document.getElementById('qblock-' + pid + '-' + qi);
  const opts = block.querySelectorAll('.q-option');
  opts.forEach(opt => {
    opt.classList.remove('correct', 'wrong');
    opt.style.pointerEvents = '';
  });
  const com = document.getElementById('qcom-' + pid + '-' + qi);
  if (com) com.classList.remove('show');
}

// ═══ INIT ════════════════════════════════════════════════════

window.addEventListener('DOMContentLoaded', () => {
  const nav = document.getElementById('passageNav');
  const main = document.getElementById('mainContent');

  PASSAGES.forEach((p, i) => {
    const pid = p.id.replace('-','');
    const btn = document.createElement('button');
    btn.className = 'pnav-btn' + (i === 0 ? ' active' : '');
    btn.id = 'pnav-' + pid;
    btn.textContent = p.id + ' · ' + p.title;
    btn.onclick = () => showPassage(pid);
    nav.appendChild(btn);
    main.innerHTML += buildPassageHTML(p);
  });

  // Show first passage
  const firstPid = PASSAGES[0].id.replace('-','');
  showPassage(firstPid);
});
</script>
</body>
